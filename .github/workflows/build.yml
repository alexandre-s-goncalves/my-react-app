name: deploy

on:
  push:
    branches:
      - main

jobs:
  ################################
  #                              #
  #       deploy-Production      #
  #                              #
  ################################
  
  deploy-Production:
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - name: Deploy Project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web-app
        run: |
          npm install --frozen-lockfile
          npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist